function exportCSV(programs, filename = "credit-bank-chiangmai.csv") {
  const head = ["รหัส", "ชื่อหลักสูตร", "สถานศึกษา", "สถานะขึ้นทะเบียนสถานศึกษา", "สังกัด", "อำเภอ", "กลุ่มอาชีพ", "รูปแบบ", "NQF", "ชั่วโมง/หน่วยกิต", "กลุ่มเป้าหมาย", "สถานะหลักสูตร", "ปี", "ผู้สมัคร", "ผู้เรียนจริง", "ได้รับหน่วยกิต", "เทียบโอนสำเร็จ", "คู่ความร่วมมือ", "รายละเอียด", "ลิงก์สมัคร", "อัปเดต"];
  const rows = programs.map((p) => [p.code, p.name, p.provider, p.reg ? "ขึ้นทะเบียนแล้ว" : "ยังไม่ขึ้นทะเบียน (เครือข่ายขับเคลื่อน)", p.affil, p.district, p.occ, `รูปแบบที่ ${p.model} ${MODELS[p.model - 1].short}`, p.nqf, p.hours, (p.targets || []).join("/"), p.status, p.year, p.learners?.applied ?? "", p.learners?.enrolled ?? "", p.learners?.credited ?? "", p.learners?.transferred ?? "", p.partners, p.fields, p.applyUrl || "", UPDATED_AT]);
  const esc = (v) => `"${String(v ?? "").replace(/"/g, '""')}"`;
  const csv = "\uFEFF" + [head, ...rows].map((r) => r.map(esc).join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = filename; a.click(); URL.revokeObjectURL(a.href);
}

  if (modalModel != null) {

          <span style={{ background: "rgba(255,255,255,.24)", borderRadius: 99, padding: "5px 14px" }}>{sch} สถานศึกษา</span>
          <span style={{ background: "rgba(255,255,255,.24)", borderRadius: 99, padding: "5px 14px" }}>{reg} ขึ้นทะเบียนแล้ว</span>

  );
}

/* ── charts (custom, lightweight) ── */
function BarByModel({ programs }) {
  const counts = MODELS.map((m) => programs.filter((p) => p.model === m.id).length);
  const max = Math.max(...counts, 1);
  return (
    <div className="card" style={{ marginBottom: 0 }}>
      <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 10 }}>จำนวนหลักสูตรแยกตาม 5 รูปแบบ</div>
      <div style={{ display: "flex", alignItems: "flex-end", gap: 10, height: 150, padding: "0 4px" }}>
        {MODELS.map((m, i) => (
          <div key={m.id} style={{ flex: 1, textAlign: "center" }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: m.color }}>{counts[i]}</div>
            <div style={{ background: m.color, borderRadius: "6px 6px 0 0", height: `${(counts[i] / max) * 110}px`, transition: "height .4s" }} />
            <div style={{ fontSize: 11, color: "#5b6a86", marginTop: 4 }}>รูปแบบ {m.id}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function DonutAffil({ programs }) {
  const data = AFFILS.map((a) => ({ a, n: programs.filter((p) => p.affil === a).length })).filter((d) => d.n > 0);
  const total = data.reduce((s, d) => s + d.n, 0) || 1;
  let acc = 0; const C = 2 * Math.PI * 42;
  return (
    <div className="card" style={{ marginBottom: 0 }}>
      <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 6 }}>สัดส่วนหลักสูตรตามสังกัด</div>
      <div style={{ display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
        <svg width="120" height="120" viewBox="0 0 120 120" role="img" aria-label="สัดส่วนหลักสูตรตามสังกัด">
          {data.map((d) => {
            const frac = d.n / total, dash = frac * C, off = -acc * C; acc += frac;
            return <circle key={d.a} cx="60" cy="60" r="42" fill="none" stroke={AFFIL_COLOR[d.a]} strokeWidth="20" strokeDasharray={`${dash} ${C - dash}`} strokeDashoffset={off} transform="rotate(-90 60 60)" />;
          })}
          <text x="60" y="64" textAnchor="middle" fontSize="18" fontWeight="700" fill="#1B2A4A">{total}</text>
        </svg>
        <div style={{ fontSize: 12.5, lineHeight: 1.9 }}>
          {data.map((d) => <div key={d.a}><span style={{ display: "inline-block", width: 10, height: 10, borderRadius: 3, background: AFFIL_COLOR[d.a], marginRight: 6 }} />{d.a} — {d.n} ({Math.round((d.n / total) * 100)}%)</div>)}
        </div>
      </div>
    </div>
  );
}

function HBarOcc({ programs }) {
  const data = OCC.map((o) => ({ o, n: programs.filter((p) => p.occ === o).length })).filter((d) => d.n > 0).sort((a, b) => b.n - a.n);
  const max = Math.max(...data.map((d) => d.n), 1);
  return (
    <div className="card" style={{ marginBottom: 0 }}>
      <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 10 }}>หลักสูตรแยกตามกลุ่มอาชีพ</div>
      {data.map((d) => (
        <div key={d.o} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6, fontSize: 12.5 }}>
          <div style={{ width: 110, textAlign: "right", color: "#3b4a6b" }}>{d.o}</div>
          <div style={{ flex: 1, background: "#e8edf6", borderRadius: 99, height: 12 }}>
            <div style={{ width: `${(d.n / max) * 100}%`, background: "var(--primary)", height: 12, borderRadius: 99 }} />
          </div>
          <div style={{ width: 22, fontWeight: 700 }}>{d.n}</div>
        </div>
      ))}
    </div>
  );
}

function DistrictBar({ programs }) {
  const data = DISTRICTS.map((d) => ({ d, n: programs.filter((p) => p.district === d).length })).filter((x) => x.n > 0).sort((a, b) => b.n - a.n).slice(0, 8);
  const max = Math.max(...data.map((x) => x.n), 1);
  return (
    <div className="card" style={{ marginBottom: 0 }}>
      <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 10 }}>หลักสูตรรายอำเภอ (สูงสุด 8 อันดับ)</div>
      {data.map((x) => (
        <div key={x.d} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6, fontSize: 12.5 }}>
          <div style={{ width: 100, textAlign: "right", color: "#3b4a6b" }}>{x.d}</div>
          <div style={{ flex: 1, background: "#e8edf6", borderRadius: 99, height: 12 }}>
            <div style={{ width: `${(x.n / max) * 100}%`, background: "#0E7C7B", height: 12, borderRadius: 99 }} />
          </div>
          <div style={{ width: 22, fontWeight: 700 }}>{x.n}</div>
        </div>
      ))}
      <div style={{ fontSize: 11, color: "#8a93a8", marginTop: 4 }}>* ระยะถัดไป: แสดงเป็นแผนที่จังหวัดเชียงใหม่รายอำเภอ</div>
    </div>
  );
}

function DemandSupply({ programs, labor }) {
  const groups = OCC.map((o) => {
    const demand = labor.filter((l) => l.occ === o).reduce((s, l) => s + (Number(l.amount) || 0), 0);
    const ps = programs.filter((p) => p.occ === o);
    const supply = sumL(ps, "enrolled");
    return { o, demand, supply, nProg: ps.length };
  }).filter((g) => g.demand > 0 || g.supply > 0);
  const max = Math.max(...groups.flatMap((g) => [g.demand, g.supply]), 1);
  if (labor.length === 0) {
    return (
      <div className="card" style={{ color: "#64748b", fontSize: 13.5, lineHeight: 1.7 }}>
        ยังไม่มีข้อมูลความต้องการกำลังคน (Demand) — เอกสารอ้างอิงไม่ได้ระบุ<br />
        เมื่อสถานประกอบการ/หน่วยงานกรอกข้อมูลผ่านแท็บ “สำหรับหน่วยงาน → สถานประกอบการ” ระบบจะเปรียบเทียบ Demand ตลาดแรงงาน กับ Supply หลักสูตร Credit Bank โดยอัตโนมัติ พร้อมชี้ช่องว่าง (เช่น ตลาดต้องการแต่ยังไม่มีหลักสูตรรองรับ)
      </div>
    );
  }
  return (
    <div className="card">
      {groups.map((g) => (
        <div key={g.o} style={{ marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 3 }}>
            <b>{g.o}</b>
            <span style={{ color: g.nProg === 0 && g.demand > 0 ? "#A34262" : "#5b6a86", fontWeight: g.nProg === 0 && g.demand > 0 ? 700 : 400 }}>
              {g.nProg === 0 && g.demand > 0 ? "⚠ ตลาดต้องการ แต่ยังไม่มีหลักสูตรในระบบ" : `${g.nProg} หลักสูตรในระบบ`}
            </span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, marginBottom: 3 }}>
            <span style={{ width: 118, textAlign: "right", color: "#A34262" }}>Demand ตลาดแรงงาน</span>

function NeedsSummary({ needs }) {

function Registry({ programs, jump }) {
  const [f, setF] = useState({ q: "", model: 0, affil: "", district: "", occ: "", nqf: "", year: "", reg: "" });
  useEffect(() => { if (jump) setF((x) => ({ ...x, model: jump })); }, [jump]);
  const rows = programs.filter((p) => {
    if (f.reg === "reg" && !p.reg) return false;
    if (f.reg === "unreg" && p.reg) return false;
    if (f.model && p.model !== Number(f.model)) return false;
    if (f.affil && p.affil !== f.affil) return false;
    if (f.district && p.district !== f.district) return false;
    if (f.occ && p.occ !== f.occ) return false;
    if (f.nqf && p.nqf !== f.nqf) return false;
    if (f.year && p.year !== f.year) return false;
    if (f.q) { const s = `${p.code} ${p.name} ${p.provider} ${p.fields} ${p.partners}`.toLowerCase(); if (!s.includes(f.q.toLowerCase())) return false; }
    return true;
  });
  const sel = (k, opts, all) => (
    <select className="field" style={{ marginBottom: 0 }} value={f[k]} onChange={(e) => setF({ ...f, [k]: e.target.value })} aria-label={all}>
      <option value="">{all}</option>{opts.map((o) => <option key={o}>{o}</option>)}
    </select>
  );
  return (
    <div className="card">
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(140px,1fr))", gap: 8, marginBottom: 10 }}>
        <input className="field" style={{ marginBottom: 0 }} placeholder="ค้นหา…" value={f.q} onChange={(e) => setF({ ...f, q: e.target.value })} />
        <select className="field" style={{ marginBottom: 0 }} value={f.model} onChange={(e) => setF({ ...f, model: Number(e.target.value) })} aria-label="รูปแบบ">
          <option value={0}>ทุกรูปแบบ</option>{MODELS.map((m) => <option key={m.id} value={m.id}>รูปแบบ {m.id} · {m.short}</option>)}
        </select>
        {sel("affil", AFFILS, "ทุกสังกัด")}
        {sel("district", DISTRICTS, "ทุกอำเภอ")}
        {sel("occ", OCC, "ทุกกลุ่มอาชีพ")}
        {sel("nqf", NQF_LEVELS, "ทุกระดับ NQF")}
        <select className="field" style={{ marginBottom: 0 }} value={f.reg} onChange={(e) => setF({ ...f, reg: e.target.value })} aria-label="การขึ้นทะเบียน">
          <option value="">ทุกสถานะขึ้นทะเบียน</option><option value="reg">✅ สถานศึกษาขึ้นทะเบียนแล้ว</option><option value="unreg">⏳ ยังไม่ขึ้นทะเบียน</option>
        </select>
        {sel("year", YEARS, "ทุกปีการศึกษา")}
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, flexWrap: "wrap", gap: 8 }}>
        <span style={{ fontSize: 13, color: "#5b6a86" }}>พบ <b style={{ color: "var(--primary)" }}>{rows.length}</b> รายการ</span>
        <button className="btn gold" onClick={() => exportCSV(rows)}>⬇ Export Excel/CSV</button>
      </div>
      <div style={{ overflowX: "auto", maxHeight: 500 }}>
        <table className="reg">
          <thead><tr><th>รหัส</th><th>หลักสูตร / สถานศึกษา</th><th>ขึ้นทะเบียน</th><th>สังกัด·อำเภอ</th><th>กลุ่มอาชีพ</th><th>รูปแบบ</th><th>NQF</th><th>ปี</th><th style={{ textAlign: "right" }}>ผู้เรียน</th><th>อัปเดต</th></tr></thead>
          <tbody>
            {rows.map((p) => (
              <tr key={p.id}>
                <td style={{ whiteSpace: "nowrap", fontWeight: 700, color: "var(--primary)" }}>{p.code}</td>
                <td><b>{p.name}</b><div style={{ color: "#5b6a86" }}>{p.provider}</div>
                  {p.fields && <div style={{ fontSize: 11.5, color: "#64748b", marginTop: 2 }}>{p.fields}</div>}
                  {p.partners && p.partners !== "-" && <div style={{ fontSize: 11.5, color: "#8a93a8", marginTop: 2 }}>🤝 {p.partners}</div>}
                  {p.dup && <div style={{ fontSize: 11.5, color: "#946200", marginTop: 2, background: "#FFF9EC", padding: "2px 6px", borderRadius: 6, display: "inline-block" }}>⚠ {p.dup}</div>}
                  {p.applyUrl && <div><a href={p.applyUrl} target="_blank" rel="noreferrer" style={{ fontSize: 11.5, color: "#0E7C7B" }}>↗ ดูรายละเอียด/สมัคร</a></div>}
                </td>
                <td>{p.reg ? <Chip color="#3D8B37" filled>✓ ขึ้นทะเบียนแล้ว</Chip> : <Chip color="#8a93a8">⏳ เครือข่าย</Chip>}</td>
                <td>{p.affil}<div style={{ color: "#8a93a8", fontSize: 11.5 }}>{p.district}</div></td>
                <td>{p.occ}</td>
                <td><Chip color={MODELS[p.model - 1].color} filled>{p.model}</Chip></td>
                <td style={{ whiteSpace: "nowrap" }}>{p.nqf}</td>
                <td style={{ whiteSpace: "nowrap" }}>{p.year}</td>
                <td style={{ textAlign: "right", fontWeight: 700 }}>{learnerVal(p, "enrolled")}</td>
                <td style={{ fontSize: 11, color: "#a99cc0", whiteSpace: "nowrap" }}>{UPDATED_AT}</td>
              </tr>
            ))}
          </tbody>
        </table>
        {rows.length === 0 && <div style={{ padding: 18, textAlign: "center", color: "#8a93a8" }}>ไม่พบรายการตามเงื่อนไข</div>}
      </div>
    </div>
  );
}

function PublicSearch({ programs }) {
  const [q, setQ] = useState(""); const [occ, setOcc] = useState(""); const [dist, setDist] = useState(""); const [model, setModel] = useState(0); const [target, setTarget] = useState(""); const [reg, setReg] = useState("");
  const rows = programs.filter((p) => {
    if (reg === "reg" && !p.reg) return false;
    if (reg === "unreg" && p.reg) return false;
    if (occ && p.occ !== occ) return false;
    if (dist && p.district !== dist) return false;
    if (model && p.model !== model) return false;
    if (target && !(p.targets || []).includes(target)) return false;
    if (q) { const s = `${p.name} ${p.provider} ${p.fields}`.toLowerCase(); if (!s.includes(q.toLowerCase())) return false; }
    return true;
  });
  return (
    <div>
      <div className="card">
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(160px,1fr))", gap: 8 }}>
          <input className="field" style={{ marginBottom: 0 }} placeholder="ค้นหา เช่น ช่างไฟฟ้า…" value={q} onChange={(e) => setQ(e.target.value)} />
          <select className="field" style={{ marginBottom: 0 }} value={occ} onChange={(e) => setOcc(e.target.value)}><option value="">ทุกสาขาอาชีพ</option>{OCC.map((o) => <option key={o}>{o}</option>)}</select>
          <select className="field" style={{ marginBottom: 0 }} value={dist} onChange={(e) => setDist(e.target.value)}><option value="">ทุกอำเภอ</option>{DISTRICTS.map((d) => <option key={d}>{d}</option>)}</select>
          <select className="field" style={{ marginBottom: 0 }} value={target} onChange={(e) => setTarget(e.target.value)}><option value="">ทุกระดับผู้เรียน</option>{TARGETS.map((t) => <option key={t}>{t}</option>)}</select>
          <select className="field" style={{ marginBottom: 0 }} value={model} onChange={(e) => setModel(Number(e.target.value))}><option value={0}>ทุกรูปแบบ Credit Bank</option>{MODELS.map((m) => <option key={m.id} value={m.id}>รูปแบบ {m.id} · {m.short}</option>)}</select>
          <select className="field" style={{ marginBottom: 0 }} value={reg} onChange={(e) => setReg(e.target.value)}><option value="">ทุกสถานะขึ้นทะเบียน</option><option value="reg">✓ สถานศึกษาขึ้นทะเบียนแล้ว</option><option value="unreg">⏳ เครือข่าย (ยังไม่ขึ้นทะเบียน)</option></select>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 10, alignItems: "center", flexWrap: "wrap", gap: 8 }}>
          <span style={{ fontSize: 13, color: "#5b6a86" }}>พบ <b style={{ color: "var(--primary)" }}>{rows.length}</b> หลักสูตรที่เปิดใช้จริง</span>
          <button className="btn gold" onClick={() => exportCSV(rows, "รายชื่อหลักสูตร-credit-bank.csv")}>⬇ ดาวน์โหลดรายชื่อหลักสูตร</button>
        </div>
      </div>
      {rows.map((p) => <ProgramCard key={p.id} p={p} />)}
      {rows.length === 0 && (
        <div className="card" style={{ textAlign: "center", color: "#64748b" }}>
          ยังไม่มีหลักสูตรที่ตรงเงื่อนไข — สาขานี้อาจยังไม่เปิดในระบบ
          <div style={{ marginTop: 6, fontSize: 13 }}>💡 ช่วยจังหวัดวางแผนได้โดยไปที่แท็บ “📝 แจ้งความต้องการเรียน”</div>
        </div>
      )}
    </div>
  );
}

/* ── ตั้งค่าการเชื่อมต่อ AI (ระยะต่อยอด) ──
   เมื่อพัฒนา Google Apps Script เสร็จ ให้วาง URL ที่ deploy ไว้ตรงนี้
   ระบบจะเปิดโหมด "พิมพ์ถามอิสระ" ให้อัตโนมัติ โดยไม่ต้องแก้โค้ดส่วนอื่น
   ตัวอย่าง: const AI_ENDPOINT = "https://script.google.com/macros/s/XXXX/exec";
   ── ปล่อยเป็นค่าว่าง = ใช้เฉพาะ chatbot แบบสคริปต์ (ฟรี ไม่มีค่าใช้จ่าย) ── */
const AI_ENDPOINT = "";

function Planner({ programs }) {
  const [msgs, setMsgs] = useState([
    { who: "bot", text: "สวัสดีค่ะ 👋 ดิฉันเป็นผู้ช่วยแนะแนวของศูนย์ธนาคารหน่วยกิตจังหวัดเชียงใหม่\n\nอยากให้ช่วยเรื่องอะไรดีคะ" },
  ]);
  const [stage, setStage] = useState("goal"); // goal → level → result | faq
  const [goal, setGoal] = useState(null);
  const [aiInput, setAiInput] = useState("");
  const [aiBusy, setAiBusy] = useState(false);
  const boxRef = useRef(null);
  useEffect(() => { boxRef.current?.scrollTo({ top: boxRef.current.scrollHeight, behavior: "smooth" }); }, [msgs, aiBusy]);

  const say = (who, text, extra = {}) => setMsgs((m) => [...m, { who, text, ...extra }]);

  const pickGoal = (key) => {
    say("user", PATHWAYS[key].label);
    setGoal(key);
    setTimeout(() => { say("bot", "ตอนนี้คุณอยู่ระดับไหนคะ"); setStage("level"); }, 250);
  };

  const pickLevel = (level) => {
    say("user", level);
    const pw = PATHWAYS[goal];
    const progs = programs.filter((p) => pw.models.includes(p.model) && ((p.targets || []).includes(level) || (p.targets || []).includes("ประชาชนทั่วไป")));
    setTimeout(() => {
      say("bot", pw.reply, { models: pw.models, steps: pw.steps, progs });
      setStage("result");
    }, 250);
  };

  const askFaq = (item) => {
    say("user", item.q);
    setTimeout(() => say("bot", item.a), 250);
  };

  const restart = () => {
    setMsgs([{ who: "bot", text: "เริ่มใหม่ได้เลยค่ะ 😊 อยากให้ช่วยเรื่องอะไรคะ" }]);
    setStage("goal"); setGoal(null);
  };

  // โหมด AI (ทำงานเมื่อกำหนด AI_ENDPOINT แล้วเท่านั้น)
  const askAI = async () => {
    const q = aiInput.trim();
    if (!q || aiBusy || !AI_ENDPOINT) return;
    say("user", q); setAiInput(""); setAiBusy(true);
    try {
      const ctx = programs.map((p) => `[${p.code}] ${p.name} | ${p.provider} | รูปแบบ ${p.model} | NQF ${p.nqf} | ${(p.targets || []).join("/")} | ${p.fields}`).join("\n");
      const res = await fetch(AI_ENDPOINT, {
        method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ question: q, context: ctx }),
      });
      const data = await res.json();
      say("bot", data.answer || "ขออภัยค่ะ ไม่สามารถตอบได้ในขณะนี้");
    } catch {
      say("bot", "เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่อีกครั้งค่ะ");
    } finally { setAiBusy(false); }
  };

  const Bubble = ({ m }) => (
    <div style={{ display: "flex", justifyContent: m.who === "user" ? "flex-end" : "flex-start", marginBottom: 9 }}>
      {m.who === "bot" && <div style={{ width: 30, height: 30, borderRadius: "50%", background: "var(--primary)", color: "#fff", display: "grid", placeItems: "center", fontSize: 15, marginRight: 7, flexShrink: 0 }}>🎓</div>}
      <div style={{ maxWidth: "82%" }}>
        <div style={{
          padding: "10px 14px", borderRadius: m.who === "user" ? "14px 14px 4px 14px" : "14px 14px 14px 4px",
          fontSize: 13.5, lineHeight: 1.65, whiteSpace: "pre-wrap",
          background: m.who === "user" ? "var(--primary)" : "#fff",
          color: m.who === "user" ? "#fff" : "var(--ink)",
          boxShadow: "0 1px 4px rgba(42,30,69,.1)",
        }}>{m.text}</div>

        {/* การ์ดผลลัพธ์: รูปแบบ + ขั้นตอน + หลักสูตร */}
        {m.steps && (
          <div style={{ background: "#fff", borderRadius: "14px", padding: "12px 14px", marginTop: 7, boxShadow: "0 1px 4px rgba(42,30,69,.1)" }}>
            <div style={{ marginBottom: 8 }}>
              {m.models.map((id) => <Chip key={id} color={MODELS[id - 1].color} filled>รูปแบบ {id} · {MODELS[id - 1].short}</Chip>)}
            </div>
            <ol style={{ margin: 0, paddingLeft: 20, fontSize: 13, lineHeight: 1.75, color: "var(--ink)" }}>
              {m.steps.map((s, i) => <li key={i}>{s}</li>)}
            </ol>
            <div style={{ marginTop: 10, paddingTop: 9, borderTop: "1px solid var(--line)", fontSize: 13, fontWeight: 700, color: "var(--primary-ink)" }}>
              📚 หลักสูตรที่เหมาะกับคุณ ({m.progs.length} รายการ)
            </div>
            {m.progs.length === 0 && <div style={{ fontSize: 12.5, color: "var(--muted)", marginTop: 5 }}>ยังไม่มีหลักสูตรตรงเงื่อนไขในระบบ — ลองกรอก “แจ้งความต้องการเรียน” เพื่อให้จังหวัดพิจารณาเปิดหลักสูตรใหม่ค่ะ</div>}
            {m.progs.slice(0, 3).map((p) => (
              <div key={p.id} style={{ fontSize: 12.5, marginTop: 7, paddingLeft: 9, borderLeft: `3px solid ${MODELS[p.model - 1].color}`, lineHeight: 1.5 }}>
                <b>{p.name}</b><br />
                <span style={{ color: "var(--muted)" }}>{p.provider} · อ.{p.district}</span>
              </div>
            ))}
            {m.progs.length > 3 && <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 7 }}>…และอีก {m.progs.length - 3} รายการ — ดูทั้งหมดได้ที่แท็บ “🔎 ค้นหาหลักสูตร”</div>}
          </div>
        )}
      </div>
    </div>
  );

  return (
    <div className="card" style={{ padding: 0, overflow: "hidden" }}>
      {/* หัวแชท */}
      <div style={{ background: "linear-gradient(120deg,var(--primary),var(--primary-2))", color: "#fff", padding: "13px 17px" }}>
        <div style={{ fontFamily: "var(--display)", fontWeight: 700, fontSize: 16 }}>💬 ผู้ช่วยแนะแนวเส้นทางการเรียน</div>
        <div style={{ fontSize: 12, opacity: .9, marginTop: 1 }}>ตอบคำถามและช่วยวางแผนการสะสม/เทียบโอนหน่วยกิต</div>
      </div>

      {/* บทสนทนา */}
      <div ref={boxRef} style={{ background: "#F7F4FB", padding: "15px 15px 8px", maxHeight: 460, overflowY: "auto" }}>
        {msgs.map((m, i) => <Bubble key={i} m={m} />)}
        {aiBusy && <div style={{ fontSize: 12.5, color: "var(--muted)", paddingLeft: 38 }}>กำลังคิดคำตอบ…</div>}
      </div>

      {/* ปุ่มตัวเลือก */}
      <div style={{ padding: "12px 15px 15px", borderTop: "1px solid var(--line)", background: "#fff" }}>
        {stage === "goal" && (
          <>
            <div style={{ fontSize: 12, color: "var(--muted)", marginBottom: 7 }}>เลือกเป้าหมายของคุณ</div>
            <div style={{ display: "flex", gap: 7, flexWrap: "wrap", marginBottom: 11 }}>
              {Object.entries(PATHWAYS).map(([k, v]) => (
                <button key={k} className="subbtn" onClick={() => pickGoal(k)}>{v.label}</button>
              ))}
            </div>
          </>
        )}

        {stage === "level" && (
          <>
            <div style={{ fontSize: 12, color: "var(--muted)", marginBottom: 7 }}>ระดับปัจจุบันของคุณ</div>
            <div style={{ display: "flex", gap: 7, flexWrap: "wrap", marginBottom: 11 }}>
              {TARGETS.map((t) => <button key={t} className="subbtn" onClick={() => pickLevel(t)}>{t}</button>)}
              <button className="subbtn" onClick={restart} style={{ background: "#F0EAF7" }}>← ย้อนกลับ</button>
            </div>
          </>
        )}

        {stage === "result" && (
          <div style={{ display: "flex", gap: 7, flexWrap: "wrap", marginBottom: 11 }}>
            <button className="btn" onClick={restart}>🔄 วางแผนใหม่</button>
          </div>
        )}

        {/* คำถามที่พบบ่อย — กดได้ตลอด */}
        <div style={{ fontSize: 12, color: "var(--muted)", marginBottom: 6 }}>❓ คำถามที่พบบ่อย</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {CHAT_FAQ.map((f) => (
            <button key={f.q} onClick={() => askFaq(f)} style={{ border: "1.5px solid var(--line)", background: "#fff", color: "var(--primary)", borderRadius: 999, padding: "6px 13px", fontSize: 12.5, fontWeight: 600, cursor: "pointer" }}>{f.q}</button>
          ))}
        </div>

        {/* ช่องพิมพ์อิสระ — เปิดใช้เมื่อเชื่อม AI แล้ว */}
        <div style={{ marginTop: 13, paddingTop: 12, borderTop: "1px dashed var(--line)" }}>
          {AI_ENDPOINT ? (
            <div style={{ display: "flex", gap: 8 }}>
              <input className="field" style={{ marginBottom: 0, flex: 1 }} placeholder="หรือพิมพ์คำถามอิสระ…" value={aiInput}
                onChange={(e) => setAiInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && askAI()} />
              <button className="btn" onClick={askAI} disabled={aiBusy}>{aiBusy ? "…" : "ส่ง"}</button>
            </div>
          ) : (
            <div style={{ fontSize: 12, color: "#a99cc0", display: "flex", alignItems: "center", gap: 6 }}>
              🔧 ช่องพิมพ์คำถามอิสระ (ผู้ช่วย AI) — อยู่ระหว่างพัฒนา จะเปิดใช้งานเมื่อเชื่อมต่อระบบเรียบร้อย
            </div>
          )}
        </div>
      </div>
    </div>
  );
}


/* ── แจ้งความต้องการพัฒนาทักษะ ── */
function NeedForm({ needs, setNeeds }) {
  const empty = { who: "นักเรียน", edu: "ม.ต้น", field: "", purpose: "เรียนต่อ", area: "", mode: "ระยะสั้น", exp: "ไม่มี", contactOk: "ใช่", contact: "" };
  const [f, setF] = useState(empty); const [msg, setMsg] = useState("");
  const set = (k) => (e) => setF({ ...f, [k]: e.target.value });
  const submit = async () => {
    setMsg("");
    if (!f.field.trim()) return setMsg("⚠ กรุณาระบุสาขาที่ต้องการเรียน");
    const ok = await setNeeds([...needs, { ...f, id: uid(), field: f.field.trim(), created: new Date().toISOString() }]);
    if (!ok) return setMsg("⚠ บันทึกไม่สำเร็จ กรุณาลองใหม่");
    setF(empty); setMsg("✅ ขอบคุณค่ะ ข้อมูลของคุณจะช่วยจังหวัดวางแผนพัฒนาหลักสูตรใหม่");
  };
  return (
    <div style={{ maxWidth: 640, margin: "0 auto" }}>
      <div className="card">
        <div style={{ fontFamily: "var(--display)", fontWeight: 700, fontSize: 16 }}>📝 แจ้งความต้องการพัฒนาทักษะหรือหลักสูตรที่สนใจ</div>
        <div style={{ fontSize: 12.5, color: "#64748b", margin: "3px 0 10px" }}>ข้อมูลนี้ช่วยให้จังหวัดเห็นว่า “ประชาชนอยากเรียนอะไร แต่ระบบยังไม่มีหลักสูตรรองรับ” (จัดเก็บแบบใช้ร่วมกันเพื่อการวิเคราะห์ — โปรดอย่ากรอกข้อมูลส่วนตัวที่ละเอียดอ่อน)</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <div><label className="lbl">สถานะผู้กรอก</label><select className="field" value={f.who} onChange={set("who")}>{["นักเรียน", "นักศึกษา", "ประชาชน", "ผู้ทำงาน", "ผู้ว่างงาน"].map((x) => <option key={x}>{x}</option>)}</select></div>
          <div><label className="lbl">ระดับการศึกษาปัจจุบัน</label><select className="field" value={f.edu} onChange={set("edu")}>{["ม.ต้น", "ม.ปลาย", "ปวช.", "ปวส.", "ปริญญาตรี", "อื่น ๆ"].map((x) => <option key={x}>{x}</option>)}</select></div>
        </div>
        <label className="lbl">สาขาที่ต้องการเรียน *</label>
        <input className="field" placeholder="เช่น ช่างไฟฟ้า, AI, อาหาร, โรงแรม, เกษตร" value={f.field} onChange={set("field")} />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <div><label className="lbl">วัตถุประสงค์</label><select className="field" value={f.purpose} onChange={set("purpose")}>{["เรียนต่อ", "เปลี่ยนอาชีพ", "เพิ่มรายได้", "ขอใบรับรอง"].map((x) => <option key={x}>{x}</option>)}</select></div>
          <div><label className="lbl">พื้นที่ที่สะดวกเรียน</label><select className="field" value={f.area} onChange={set("area")}><option value="">เลือกอำเภอ / รูปแบบ</option>{[...DISTRICTS, "ออนไลน์", "ผสมผสาน"].map((x) => <option key={x}>{x}</option>)}</select></div>
          <div><label className="lbl">รูปแบบที่ต้องการ</label><select className="field" value={f.mode} onChange={set("mode")}>{["ระยะสั้น", "รายวิชา", "เสาร์-อาทิตย์", "หลังเลิกงาน"].map((x) => <option key={x}>{x}</option>)}</select></div>
          <div><label className="lbl">ประสบการณ์เดิม</label><select className="field" value={f.exp} onChange={set("exp")}>{["ไม่มี", "มีประสบการณ์ทำงาน", "มีใบรับรอง"].map((x) => <option key={x}>{x}</option>)}</select></div>
          <div><label className="lbl">ยินยอมให้ติดต่อกลับ</label><select className="field" value={f.contactOk} onChange={set("contactOk")}><option>ใช่</option><option>ไม่ใช่</option></select></div>
          <div><label className="lbl">ช่องทางติดต่อ (ถ้ายินยอม)</label><input className="field" placeholder="เบอร์โทร / อีเมล / ไลน์" value={f.contact} onChange={set("contact")} disabled={f.contactOk === "ไม่ใช่"} /></div>
        </div>
        {msg && <div style={{ fontSize: 13.5, marginBottom: 8, color: msg.startsWith("✅") ? "#166534" : "#B3261E" }}>{msg}</div>}
        <button className="btn" onClick={submit}>ส่งข้อมูลความต้องการ</button>
      </div>
    </div>
  );
}

/* ── ขอคำปรึกษา ── */
function ConsultForm({ consults, setConsults }) {
  const [f, setF] = useState({ name: "", contact: "", q: "" }); const [msg, setMsg] = useState("");
  const submit = async () => {
    setMsg("");
    if (!f.q.trim() || !f.contact.trim()) return setMsg("⚠ กรุณากรอกคำถามและช่องทางติดต่อกลับ");
    const ok = await setConsults([...consults, { ...f, id: uid(), created: new Date().toISOString(), status: "รอติดต่อกลับ" }]);
    if (!ok) return setMsg("⚠ บันทึกไม่สำเร็จ กรุณาลองใหม่");
    setF({ name: "", contact: "", q: "" }); setMsg("✅ รับเรื่องแล้ว เจ้าหน้าที่/สถานศึกษาจะติดต่อกลับตามช่องทางที่ระบุ");
  };
  return (
    <div style={{ maxWidth: 560, margin: "0 auto" }}>
      <div className="card">
        <div style={{ fontFamily: "var(--display)", fontWeight: 700, fontSize: 16, marginBottom: 8 }}>💬 แบบฟอร์มขอคำปรึกษา</div>
        <label className="lbl">ชื่อ (จะระบุหรือไม่ก็ได้)</label>
        <input className="field" value={f.name} onChange={(e) => setF({ ...f, name: e.target.value })} />

const ROLES = [
  ["school", "สถานศึกษา — กรอก/แก้ไขหลักสูตรของตนเอง"],
  ["employer", "สถานประกอบการ/หน่วยงานรัฐ — แจ้งความต้องการกำลังคน"],
  ["parent", "หน่วยงานต้นสังกัด — ดูข้อมูลสถานศึกษาในสังกัด"],
  ["admin", "Admin จังหวัด (ศธจ.) — อนุมัติ/จัดการข้อมูลทั้งหมด"],
];
const ADMIN_CODE = "CMI-ADMIN"; // รหัสสาธิตสำหรับสมัครสิทธิ์ Admin

function AgencyPortal({ session, setSession, db, setAgencies, setPrograms, setLabor, allPrograms, allLabor }) {
  if (!session) return <Auth agencies={db.agencies} setAgencies={setAgencies} onLogin={setSession} />;
  return <Workspace session={session} onLogout={() => setSession(null)} db={db} setAgencies={setAgencies} setPrograms={setPrograms} setLabor={setLabor} allPrograms={allPrograms} allLabor={allLabor} />;
}

function Auth({ agencies, setAgencies, onLogin }) {
  const [mode, setMode] = useState("login");
  const [f, setF] = useState({ role: "school", org: "", affil: "สพฐ.", district: "เมืองเชียงใหม่", contact: "", email: "", pw: "", adminCode: "" });
  const [err, setErr] = useState("");
  const set = (k) => (e) => setF({ ...f, [k]: e.target.value });
  const submit = async () => {
    setErr("");
    const email = f.email.trim().toLowerCase();
    if (!email || !f.pw) return setErr("กรุณากรอกอีเมลและรหัสผ่าน");
    if (mode === "register") {
      if (!f.org.trim() || !f.contact.trim()) return setErr("กรุณากรอกชื่อหน่วยงานและผู้ประสานงาน");
      if (f.role === "admin" && f.adminCode !== ADMIN_CODE) return setErr("รหัสยืนยันสิทธิ์ Admin ไม่ถูกต้อง (ระบบสาธิต: CMI-ADMIN)");
      if (agencies.some((a) => a.email === email)) return setErr("อีเมลนี้ลงทะเบียนแล้ว กรุณาเข้าสู่ระบบ");
      const org = f.org.trim();
      const a = { id: uid(), role: f.role, org, affil: f.affil, district: f.district, contact: f.contact.trim(), email, pw: hash(f.pw), created: new Date().toISOString(), regStatus: f.role === "school" ? (isRegProvider(org) ? "ขึ้นทะเบียนแล้ว" : "ยังไม่ขึ้นทะเบียน") : undefined };
      const ok = await setAgencies([...agencies, a]);
      if (!ok) return setErr("บันทึกไม่สำเร็จ กรุณาลองใหม่");
      onLogin(a);
    } else {
      const a = agencies.find((x) => x.email === email && x.pw === hash(f.pw));
      if (!a) return setErr("อีเมลหรือรหัสผ่านไม่ถูกต้อง");
      onLogin(a);
    }
  };
  return (
    <div style={{ maxWidth: 480, margin: "0 auto" }}>
      <div className="card">
        <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
          <button className={`btn ${mode === "login" ? "" : "ghost"}`} style={{ flex: 1 }} onClick={() => { setMode("login"); setErr(""); }}>เข้าสู่ระบบ</button>
          <button className={`btn ${mode === "register" ? "" : "ghost"}`} style={{ flex: 1 }} onClick={() => { setMode("register"); setErr(""); }}>ลงทะเบียนหน่วยงาน</button>
        </div>
        {mode === "register" && (
          <>
            <label className="lbl">ประเภทผู้ใช้งาน / สิทธิ์</label>
            <select className="field" value={f.role} onChange={set("role")}>{ROLES.map(([v, t]) => <option key={v} value={v}>{t}</option>)}</select>
            {f.role === "admin" && (<><label className="lbl">รหัสยืนยันสิทธิ์ Admin จังหวัด</label><input className="field" value={f.adminCode} onChange={set("adminCode")} placeholder="ระบบสาธิต: CMI-ADMIN" /></>)}
            <label className="lbl">ชื่อหน่วยงาน / สถานศึกษา / สถานประกอบการ</label>
            <input className="field" placeholder="เช่น วิทยาลัยเทคนิคเชียงใหม่" value={f.org} onChange={set("org")} />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <div><label className="lbl">สังกัด</label><select className="field" value={f.affil} onChange={set("affil")}>{AFFILS.map((a) => <option key={a}>{a}</option>)}</select></div>
              <div><label className="lbl">อำเภอ</label><select className="field" value={f.district} onChange={set("district")}>{DISTRICTS.map((d) => <option key={d}>{d}</option>)}</select></div>
            </div>
            <label className="lbl">ชื่อผู้ประสานงาน</label>
            <input className="field" value={f.contact} onChange={set("contact")} />
          </>
        )}
        <label className="lbl">อีเมล</label>
        <input className="field" type="email" value={f.email} onChange={set("email")} />
        <label className="lbl">รหัสผ่าน</label>
        <input className="field" type="password" value={f.pw} onChange={set("pw")} onKeyDown={(e) => e.key === "Enter" && submit()} />
        {err && <div style={{ color: "#B3261E", fontSize: 13, marginBottom: 8 }}>⚠ {err}</div>}
        <button className="btn" style={{ width: "100%" }} onClick={submit}>{mode === "register" ? "ลงทะเบียนและเข้าสู่ระบบ" : "เข้าสู่ระบบ"}</button>
        <div style={{ fontSize: 11.5, color: "#8a93a8", marginTop: 9, lineHeight: 1.6 }}>
          ระบบสาธิต: ข้อมูลที่บันทึกจัดเก็บแบบใช้ร่วมกัน (ผู้ใช้แดชบอร์ดนี้ทุกคนมองเห็นได้) — ไม่ควรใช้รหัสผ่านเดียวกับบัญชีจริง
        </div>
      </div>
    </div>
  );
}

function Workspace({ session, onLogout, db, setAgencies, setPrograms, setLabor, allPrograms, allLabor }) {
  const role = session.role || "school";
  const me = db.agencies.find((a) => a.id === session.id) || session;
  const myReg = isRegProvider(me.org) || me.regStatus === "ขึ้นทะเบียนแล้ว";
  return (
    <div>
      <div className="card" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
        <div>
          <div style={{ fontFamily: "var(--display)", fontWeight: 700, fontSize: 16.5 }}>{session.org}
            {role === "school" && (myReg
              ? <Chip color="#3D8B37" filled>✓ ขึ้นทะเบียนธนาคารหน่วยกิตแล้ว</Chip>
              : <Chip color="#C07F00">⏳ ยังไม่ขึ้นทะเบียน — รอการรับรองจากศูนย์จังหวัด</Chip>)}
          </div>
          <div style={{ fontSize: 12.5, color: "#5b6a86" }}>{ROLES.find(([v]) => v === role)?.[1]} · {session.affil} · อ.{session.district} · ผู้ประสานงาน: {session.contact}</div>
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <button className="btn gold" onClick={() => exportCSV(role === "parent" ? allPrograms.filter((p) => p.affil === session.affil) : allPrograms)}>⬇ Export Excel/CSV {role === "parent" ? "(เฉพาะสังกัด)" : "(ทั้งหมด)"}</button>
          <button className="btn ghost" onClick={onLogout}>ออกจากระบบ</button>
        </div>
      </div>
      {role === "school" && <SchoolWs session={session} customPrograms={db.programs} setPrograms={setPrograms} />}
      {role === "employer" && <EmployerWs session={session} labor={db.labor} setLabor={setLabor} allLabor={allLabor} />}
      {role === "parent" && <ParentWs session={session} allPrograms={allPrograms} />}
      {role === "admin" && <AdminWs db={db} setPrograms={setPrograms} setAgencies={setAgencies} allPrograms={allPrograms} />}
    </div>
  );
}

        <div style={{ fontSize: 12, color: "#8a93a8", marginBottom: 8 }}>📎 การแนบเอกสาร (หลักสูตร, MOU, แผนการจัดการเรียนรู้) — ระยะถัดไปเชื่อมที่จัดเก็บไฟล์ของหน่วยงาน; ระหว่างนี้ระบุลิงก์เอกสารในช่องรายละเอียดได้</div>
        {msg && <div style={{ fontSize: 13.5, marginBottom: 8, color: msg.startsWith("✅") ? "#166534" : "#B3261E" }}>{msg}</div>}
        <button className="btn" onClick={submit}>บันทึกหลักสูตร</button>
      </div>
      <SectionTitle>หลักสูตรของหน่วยงานคุณ ({mine.length})</SectionTitle>
      {mine.map((p) => (
        <div key={p.id} style={{ position: "relative" }}>
          <ProgramCard p={p} />
          <div style={{ position: "absolute", top: 12, right: 12, display: "flex", gap: 6 }}>
            <Chip color={STATUS_COLOR[p.status]}>{p.status}</Chip>
            <button onClick={() => remove(p.id)} style={{ border: "none", background: "#fdecec", color: "#B3261E", borderRadius: 8, padding: "3px 10px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>ลบ</button>
          </div>
        </div>
      ))}
      {mine.length === 0 && <div className="card" style={{ color: "#64748b" }}>ยังไม่มีหลักสูตรที่บันทึก — เริ่มจากแบบฟอร์มด้านบน</div>}
    </div>
  );
}

/* ── สถานประกอบการ: ความต้องการกำลังคน ── */
function EmployerWs({ session, labor, setLabor, allLabor }) {
  const empty = { biz: "ท่องเที่ยว/บริการ", position: "", occ: OCC[0], skills: "", amount: "", level: "พื้นฐาน", district: session.district, coDev: "ใช่", intern: "ใช่" };
  const [f, setF] = useState(empty); const [msg, setMsg] = useState("");
  const mine = labor.filter((l) => l.ownerId === session.id);
  const submit = async () => {
    setMsg("");
    if (!f.position.trim() || !f.amount) return setMsg("⚠ กรุณาระบุตำแหน่งงานและจำนวนที่ต้องการ");
    const ok = await setLabor([...labor, { ...f, id: uid(), ownerId: session.id, org: session.org, position: f.position.trim(), amount: Number(f.amount), created: new Date().toISOString() }]);
    if (!ok) return setMsg("⚠ บันทึกไม่สำเร็จ");
    setF(empty); setMsg("✅ บันทึกแล้ว — ข้อมูลจะปรากฏในกราฟ Demand–Supply บน Dashboard ผู้บริหาร");
  };
  return (
    <div>
      <div className="card">
        <div style={{ fontFamily: "var(--display)", fontWeight: 700, fontSize: 15.5, marginBottom: 3 }}>🏭 แจ้งความต้องการกำลังคนและทักษะอาชีพ</div>
        <div style={{ fontSize: 12.5, color: "#64748b", marginBottom: 9 }}>ข้อมูลนี้ใช้เปรียบเทียบ Demand ตลาดแรงงาน กับ Supply หลักสูตร Credit Bank เพื่อวางแผนพัฒนาหลักสูตรของจังหวัด</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(190px,1fr))", gap: 9 }}>
          <div><label className="lbl">ประเภทธุรกิจ</label><select className="field" value={f.biz} onChange={(e) => setF({ ...f, biz: e.target.value })}>{["ท่องเที่ยว/บริการ", "อุตสาหกรรม", "เกษตร", "ดิจิทัล", "สุขภาพ", "พลังงาน", "อื่น ๆ"].map((x) => <option key={x}>{x}</option>)}</select></div>
          <div><label className="lbl">ตำแหน่งงานที่ต้องการ *</label><input className="field" placeholder="เช่น ช่างไฟฟ้า, Barista" value={f.position} onChange={(e) => setF({ ...f, position: e.target.value })} /></div>
          <div><label className="lbl">กลุ่มอาชีพ (สำหรับจับคู่หลักสูตร)</label><select className="field" value={f.occ} onChange={(e) => setF({ ...f, occ: e.target.value })}>{OCC.map((o) => <option key={o}>{o}</option>)}</select></div>
          <div><label className="lbl">จำนวนที่ต้องการ (คน/ปี) *</label><input className="field" type="number" min="1" value={f.amount} onChange={(e) => setF({ ...f, amount: e.target.value })} /></div>
          <div><label className="lbl">ระดับทักษะ</label><select className="field" value={f.level} onChange={(e) => setF({ ...f, level: e.target.value })}><option>พื้นฐาน</option><option>กลาง</option><option>สูง</option></select></div>
          <div><label className="lbl">พื้นที่ทำงาน</label><select className="field" value={f.district} onChange={(e) => setF({ ...f, district: e.target.value })}>{DISTRICTS.map((d) => <option key={d}>{d}</option>)}</select></div>
          <div><label className="lbl">ร่วมพัฒนาหลักสูตร</label><select className="field" value={f.coDev} onChange={(e) => setF({ ...f, coDev: e.target.value })}><option>ใช่</option><option>ไม่ใช่</option></select></div>
          <div><label className="lbl">รับนักเรียนฝึกงาน</label><select className="field" value={f.intern} onChange={(e) => setF({ ...f, intern: e.target.value })}><option>ใช่</option><option>ไม่ใช่</option></select></div>
        </div>
        <label className="lbl">ทักษะที่ต้องการ (Hard/Soft Skills)</label>
        <textarea className="field" rows={2} placeholder="เช่น เดินสายไฟ, ภาษาอังกฤษบริการ, การทำงานเป็นทีม" value={f.skills} onChange={(e) => setF({ ...f, skills: e.target.value })} />
        {msg && <div style={{ fontSize: 13.5, marginBottom: 8, color: msg.startsWith("✅") ? "#166534" : "#B3261E" }}>{msg}</div>}
        <button className="btn" onClick={submit}>บันทึกความต้องการกำลังคน</button>
      </div>
      <SectionTitle>รายการของหน่วยงานคุณ ({mine.length})</SectionTitle>
      {mine.map((l) => (
        <div key={l.id} className="card" style={{ borderLeft: "5px solid #A34262" }}>
          <b>{l.position}</b> · {l.occ} · <span style={{ color: "#A34262", fontWeight: 700 }}>{num(l.amount)} คน/ปี</span> · ระดับ{l.level} · อ.{l.district}
          <div style={{ fontSize: 12.5, color: "#5b6a86", marginTop: 3 }}>ทักษะ: {l.skills || "-"} · ร่วมพัฒนาหลักสูตร: {l.coDev} · รับฝึกงาน: {l.intern}</div>
        </div>
      ))}
      {mine.length === 0 && <div className="card" style={{ color: "#64748b" }}>ยังไม่มีรายการ</div>}
    </div>
  );
}

/* ── ต้นสังกัด: ดูข้อมูลในสังกัด ── */
function ParentWs({ session, allPrograms }) {
  const rows = allPrograms.filter((p) => p.affil === session.affil);
  return (
    <div>
      <SectionTitle>หลักสูตรของสถานศึกษาในสังกัด {session.affil} ({rows.length})</SectionTitle>
      {rows.map((p) => (
        <div key={p.id} style={{ position: "relative" }}>
          <ProgramCard p={p} />
          <div style={{ position: "absolute", top: 12, right: 12 }}><Chip color={STATUS_COLOR[p.status]}>{p.status}</Chip></div>
        </div>
      ))}
    </div>
  );
}

/* ── Admin จังหวัด: อนุมัติ + ดูแบบฟอร์ม ── */
function AdminWs({ db, setPrograms, setAgencies, allPrograms }) {
  const [view, setView] = useState("approve");
  const pending = db.programs.filter((p) => ["ร่าง", "รอรับรอง"].includes(p.status));
  const schoolAgencies = db.agencies.filter((a) => a.role === "school");
  const pendingReg = schoolAgencies.filter((a) => !isRegProvider(a.org) && a.regStatus !== "ขึ้นทะเบียนแล้ว");
  const setStatus = async (id, status) => setPrograms(db.programs.map((p) => (p.id === id ? { ...p, status } : p)));
  const setReg = async (id, regStatus) => setAgencies(db.agencies.map((a) => (a.id === id ? { ...a, regStatus } : a)));
  return (
    <div>
      <div className="subnav">
        {[["approve", `✅ อนุมัติหลักสูตร (${pending.length})`], ["register", `🏫 รับรองขึ้นทะเบียนสถานศึกษา (${pendingReg.length})`], ["consults", `💬 คำขอคำปรึกษา (${db.consults.length})`], ["needs", `📝 ความต้องการผู้เรียน (${db.needs.length})`]].map(([k, t]) => (
          <button key={k} className={`subbtn ${view === k ? "on" : ""}`} onClick={() => setView(k)}>{t}</button>
        ))}
      </div>
      {view === "register" && (
        <div>
          <div className="card" style={{ fontSize: 13, color: "#5b6a86" }}>
            สถานศึกษาที่ขึ้นทะเบียนอย่างเป็นทางการแล้ว {REGISTERED.length} แห่ง (สอศ. 4 · อว. 4) จะได้รับสถานะ “✓ ขึ้นทะเบียนแล้ว” อัตโนมัติ — รายการด้านล่างคือสถานศึกษาที่ลงทะเบียนเข้าใช้ระบบและรอการรับรองขึ้นทะเบียนจากศูนย์ธนาคารหน่วยกิตระดับจังหวัด
          </div>
          {schoolAgencies.length === 0 && <div className="card" style={{ color: "#64748b" }}>ยังไม่มีสถานศึกษาลงทะเบียนเข้าใช้ระบบ</div>}
          {schoolAgencies.map((a) => {
            const auto = isRegProvider(a.org);
            const reg = auto || a.regStatus === "ขึ้นทะเบียนแล้ว";
            return (
              <div key={a.id} className="card" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8, borderLeft: `5px solid ${reg ? "#3D8B37" : "#C07F00"}` }}>
                <div>
                  <b>{a.org}</b> {reg ? <Chip color="#3D8B37" filled>✓ ขึ้นทะเบียนแล้ว{auto ? " (ทางการ)" : ""}</Chip> : <Chip color="#C07F00">⏳ ยังไม่ขึ้นทะเบียน</Chip>}
                  <div style={{ fontSize: 12.5, color: "#5b6a86" }}>{a.affil} · อ.{a.district} · ผู้ประสานงาน: {a.contact} ({a.email})</div>
                </div>
                {!auto && (reg
                  ? <button className="btn ghost" style={{ padding: "5px 13px", fontSize: 12.5 }} onClick={() => setReg(a.id, "ยังไม่ขึ้นทะเบียน")}>ยกเลิกการรับรอง</button>
                  : <button className="btn" style={{ padding: "5px 13px", fontSize: 12.5 }} onClick={() => setReg(a.id, "ขึ้นทะเบียนแล้ว")}>รับรองขึ้นทะเบียน ✓</button>)}
              </div>
            );
          })}
        </div>
      )}
      {view === "approve" && (
        <div>
          {pending.length === 0 && <div className="card" style={{ color: "#64748b" }}>ไม่มีหลักสูตรที่รอการอนุมัติ (หลักสูตรที่หน่วยงานส่งใหม่จะปรากฏที่นี่)</div>}
          {pending.map((p) => (
            <div key={p.id} style={{ position: "relative" }}>
              <ProgramCard p={p} />
              <div style={{ position: "absolute", top: 12, right: 12, display: "flex", gap: 6 }}>
                <button className="btn" style={{ padding: "4px 12px", fontSize: 12.5 }} onClick={() => setStatus(p.id, "เปิดใช้จริง")}>อนุมัติ → เปิดใช้จริง</button>
                <button className="btn ghost" style={{ padding: "4px 12px", fontSize: 12.5 }} onClick={() => setStatus(p.id, "ปิดปรับปรุง")}>ส่งกลับปรับปรุง</button>
              </div>
            </div>
          ))}
        </div>
      )}
      {view === "consults" && (
        <div>
          {db.consults.length === 0 && <div className="card" style={{ color: "#64748b" }}>ยังไม่มีคำขอคำปรึกษา</div>}
          {db.consults.map((c) => (
            <div key={c.id} className="card">
              <div style={{ fontSize: 13.5 }}><b>{c.name || "ไม่ระบุชื่อ"}</b> · ติดต่อกลับ: {c.contact} · <span style={{ color: "#C07F00" }}>{c.status}</span></div>
              <div style={{ fontSize: 13.5, marginTop: 4 }}>{c.q}</div>
              <div style={{ fontSize: 11.5, color: "#8a93a8", marginTop: 3 }}>{new Date(c.created).toLocaleString("th-TH")}</div>
            </div>
          ))}
        </div>
      )}
      {view === "needs" && (
        <div>
          {db.needs.length === 0 && <div className="card" style={{ color: "#64748b" }}>ยังไม่มีข้อมูลความต้องการจากประชาชน</div>}
          {db.needs.map((n) => (
            <div key={n.id} className="card" style={{ fontSize: 13.5 }}>
              <b>{n.field}</b> — {n.who} ({n.edu}) · วัตถุประสงค์: {n.purpose} · พื้นที่: {n.area || "-"} · รูปแบบ: {n.mode} · ประสบการณ์: {n.exp}
              {n.contactOk === "ใช่" && n.contact && <div style={{ color: "#0E7C7B" }}>ยินยอมให้ติดต่อ: {n.contact}</div>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
